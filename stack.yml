version: "3.7"

services:

## --------------------------- ORION --------------------------- ##

  mobilidade:
    image: mobilidade-inteligente-curitiba:latest

    networks:
      - SpagiSistemas

    environment:
      ## Dados de Acesso
      - APP_HOST=mobilidade.spagisistemas.com.br

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.mobilidade.rule=Host(`mobilidade.spagisistemas.com.br`)
        - traefik.http.services.mobilidade.loadbalancer.server.port=80
        - traefik.http.routers.mobilidade.service=mobilidade
        - traefik.http.routers.mobilidade.tls.certresolver=letsencryptresolver
        - traefik.http.routers.mobilidade.entrypoints=websecure
        - traefik.http.routers.mobilidade.tls=true

## --------------------------- ORION --------------------------- ##

networks:
  SpagiSistemas:
    external: true
    name: SpagiSistemas
